<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Pontinho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at center,#1a472a,#0d2b18,#081a0f);min-height:100vh;font-family:Georgia,serif;color:#f0e6c8;display:flex;align-items:center;justify-content:center}
.card{background:linear-gradient(160deg,#1b3a28,#0f2419);border:2px solid #c9a84c;border-radius:20px;padding:36px 32px;width:340px;max-width:95vw;box-shadow:0 0 60px #00000088}
h1{color:#c9a84c;font-size:28px;letter-spacing:4px;text-align:center;margin-bottom:6px}
.sub{color:#7ab87a;font-size:13px;text-align:center;margin-bottom:28px;letter-spacing:1px}
input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid #3a6640;background:rgba(0,0,0,0.35);color:#f0e6c8;font-size:15px;font-family:Georgia,serif;margin-bottom:10px;outline:none}
input::placeholder{color:#5a7a5a}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:Georgia,serif;margin-bottom:8px}
.btn-gold{background:linear-gradient(135deg,#8b6914,#c9a84c);color:#fff;border:1px solid #f0d060}
.btn-green{background:linear-gradient(135deg,#1a6e35,#2a9e55);color:#fff}
.btn-back{background:transparent;color:#7ab87a;font-size:13px;border:none}
.players{background:rgba(0,0,0,0.3);border-radius:12px;padding:14px;margin-bottom:16px}
.players h3{font-size:11px;color:#7ab87a;letter-spacing:2px;margin-bottom:10px}
.player-item{color:#f0e6c8;font-size:14px;padding:5px 0;border-bottom:1px solid #1a4a2a}
.code{font-size:32px;letter-spacing:8px;color:#c9a84c;text-align:center;font-weight:700;margin:10px 0 20px}
.status{color:#e07070;font-size:12px;margin-bottom:8px;min-height:16px}
.waiting{color:#7ab87a;font-size:13px;text-align:center;margin-top:8px}
.logo{font-size:48px;text-align:center;margin-bottom:8px;filter:drop-shadow(0 0 12px #c9a84c)}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SERVER = "https://pontinho-server-production.up.railway.app";
let socket = null;
let state = {
  screen: "home", // home | create | join | lobby
  name: "",
  joinCode: "",
  roomCode: "",
  players: [],
  isCreator: false,
  error: "",
  playerIdx: 0
};

function getSocket() {
  if (!socket) socket = io(SERVER, {transports:["websocket"]});
  return socket;
}

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === "home") app.innerHTML = homeScreen();
  else if (state.screen === "lobby") app.innerHTML = lobbyScreen();
  else if (state.screen === "join") app.innerHTML = joinScreen();
  else if (state.screen === "game") app.innerHTML = "<div style='padding:20px;color:#c9a84c;font-size:18px;text-align:center'>Jogo a carregar...<br><small style='color:#7ab87a;font-size:13px'>Versao multiplayer em desenvolvimento</small></div>";
  attachEvents();
}

function homeScreen() {
  return `<div class="card">
    <div class="logo">&#x1F0CF;</div>
    <h1>PONTINHO</h1>
    <div class="sub">Jogo de baralho em familia</div>
    <div class="status">${state.error}</div>
    <label style="font-size:11px;color:#7ab87a;letter-spacing:2px;display:block;margin-bottom:6px">SEU NOME</label>
    <input id="inp-name" placeholder="Como quer ser chamado?" value="${state.name}">
    <button class="btn btn-gold" onclick="doCreate()">&#x1F3E0; CRIAR SALA</button>
    <button class="btn" style="background:rgba(0,0,0,0.3);border:1px solid #3a6640;color:#f0e6c8" onclick="setState({screen:'join',error:''})">&#x1F6AA; ENTRAR EM SALA</button>
  </div>`;
}

function joinScreen() {
  return `<div class="card">
    <div class="logo">&#x1F0CF;</div>
    <h1>PONTINHO</h1>
    <div class="sub">Entrar numa sala</div>
    <div class="status">${state.error}</div>
    <label style="font-size:11px;color:#7ab87a;letter-spacing:2px;display:block;margin-bottom:6px">SEU NOME</label>
    <input id="inp-name2" placeholder="O seu nome" value="${state.name}">
    <label style="font-size:11px;color:#7ab87a;letter-spacing:2px;display:block;margin-bottom:6px;margin-top:8px">CODIGO DA SALA</label>
    <input id="inp-code" placeholder="Ex: ABC12" maxlength="5" style="letter-spacing:4px;font-size:18px;text-align:center" value="${state.joinCode}">
    <button class="btn btn-green" onclick="doJoin()" style="margin-top:4px">ENTRAR</button>
    <button class="btn-back btn" onclick="setState({screen:'home',error:''})">&#8592; Voltar</button>
  </div>`;
}

function lobbyScreen() {
  const playerItems = state.players.map((p,i) => 
    `<div class="player-item">${i===0?"&#x1F451; ":"&#x1F464; "}${p}</div>`
  ).join("");
  return `<div class="card">
    <div class="logo">&#x1F0CF;</div>
    <h1>PONTINHO</h1>
    <div class="sub">Sala criada! Partilhe o codigo:</div>
    <div class="code">${state.roomCode}</div>
    <div class="players">
      <h3>JOGADORES (${state.players.length})</h3>
      ${playerItems}
    </div>
    ${state.isCreator 
      ? `<button class="btn btn-gold" onclick="doStart()" ${state.players.length<2?"disabled style='opacity:0.5;cursor:not-allowed'":""}>INICIAR JOGO</button>`
      : `<div class="waiting">A aguardar que o criador inicie...</div>`
    }
  </div>`;
}

function doCreate() {
  const name = document.getElementById("inp-name")?.value?.trim();
  if (!name) { setState({error:"Digite o seu nome primeiro."}); return; }
  setState({name, error:"A ligar ao servidor..."});
  const s = getSocket();
  s.off("roomCreated"); s.off("error");
  s.on("roomCreated", ({code, playerIdx, players}) => {
    setState({screen:"lobby", roomCode:code, players, isCreator:true, playerIdx, error:""});
  });
  s.on("playerJoined", ({players}) => setState({players}));
  s.on("gameStarted", () => setState({screen:"game"}));
  s.on("error", msg => setState({error:"Erro: "+msg}));
  s.emit("createRoom", {name});
}

function doJoin() {
  const name = document.getElementById("inp-name2")?.value?.trim();
  const code = document.getElementById("inp-code")?.value?.trim().toUpperCase();
  if (!name) { setState({error:"Digite o seu nome."}); return; }
  if (!code || code.length < 4) { setState({error:"Codigo invalido."}); return; }
  setState({name, joinCode:code, error:"A ligar..."});
  const s = getSocket();
  s.off("roomJoined"); s.off("error");
  s.on("roomJoined", ({code:c, playerIdx, players}) => {
    setState({screen:"lobby", roomCode:c, players, isCreator:false, playerIdx, error:""});
  });
  s.on("playerJoined", ({players}) => setState({players}));
  s.on("gameStarted", () => setState({screen:"game"}));
  s.on("error", msg => setState({error:"Erro: "+msg}));
  s.emit("joinRoom", {code, name});
}

function doStart() {
  getSocket().emit("startGame");
}

function attachEvents() {
  // Keep input values in sync
  const n1 = document.getElementById("inp-name");
  const n2 = document.getElementById("inp-name2");
  const c = document.getElementById("inp-code");
  if (n1) n1.addEventListener("input", e => state.name = e.target.value);
  if (n2) n2.addEventListener("input", e => state.name = e.target.value);
  if (c) c.addEventListener("input", e => state.joinCode = e.target.value.toUpperCase());
}

render();
</script>
</body>
</html>
